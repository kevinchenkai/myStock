<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myStock · 我的港美股</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    // 首屏即应用主题，避免深/浅切换闪烁（FOUC）。
    // localStorage 存 'light' / 'dark' / 'system'（或未设置=跟随系统）。
    (function () {
      try {
        var t = localStorage.getItem("mystock-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header>
    <span class="brand">M</span>
    <h1>myStock</h1>
    <span class="sub">个人港美股持仓 / 交易 / 行情（本地）· <span class="up">红涨</span> <span class="down">绿跌</span></span>
    <button class="theme-toggle" id="theme-toggle" type="button" title="切换主题：跟随系统 / 浅色 / 深色">
      <span class="tt-icon" id="tt-icon">🖥️</span>
      <span id="tt-label">跟随系统</span>
    </button>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="positions">我的持仓</div>
    <div class="tab" data-tab="trades">我的交易</div>
    <div class="tab" data-tab="pnl">交易盈亏</div>
    <div class="tab" data-tab="trend">资产趋势</div>
    <div class="tab" data-tab="fx">美元汇率</div>
  </div>

  <div class="container">
    <!-- 持仓 -->
    <div class="panel" id="panel-positions">
      <div class="toolbar">
        <div class="filter" data-filter="positions">
          <span class="filter-label">市场</span>
          <span class="chip active" data-market="">全部</span>
          <span class="chip" data-market="US">美股</span>
          <span class="chip" data-market="HK">港股</span>
        </div>
        <div class="muted" id="positions-meta"></div>
      </div>
      <!-- 组合概览：用最新快照按币种汇总（零新数据） -->
      <div id="portfolio-overview"></div>
      <div id="positions-table"></div>
    </div>

    <!-- 交易 -->
    <div class="panel" id="panel-trades" style="display:none;">
      <div class="toolbar">
        <div class="subtabs">
          <div class="subtab active" data-sub="orders">按订单</div>
          <div class="subtab" data-sub="deals">按成交</div>
        </div>
        <div class="filter" data-filter="trades">
          <span class="filter-label">市场</span>
          <span class="chip active" data-market="">全部</span>
          <span class="chip" data-market="US">美股</span>
          <span class="chip" data-market="HK">港股</span>
        </div>
        <div class="filter" data-filter="year">
          <span class="filter-label">时间</span>
          <span class="chip" data-year="">全部</span>
          <!-- 最近三年子 Tab + 更早年份下拉，均由 app.js 动态填充 -->
          <span class="year-tabs"></span>
          <select class="year-select" title="选择更早年份"></select>
        </div>
      </div>
      <div id="orders-table"></div>
      <div id="deals-table" style="display:none;"></div>
    </div>

    <!-- 交易盈亏 -->
    <div class="panel" id="panel-pnl" style="display:none;">
      <div class="toolbar">
        <div class="filter" data-filter="pnl">
          <span class="filter-label">市场</span>
          <span class="chip active" data-market="">全部</span>
          <span class="chip" data-market="US">美股</span>
          <span class="chip" data-market="HK">港股</span>
        </div>
        <div class="muted" id="pnl-meta"></div>
      </div>
      <div id="pnl-table"></div>

      <!-- 财务统计：年度现金流（收-付），按美股/港股分别汇总 -->
      <div class="finance-section">
        <div class="toolbar">
          <h3 class="section-title">财务统计</h3>
          <div class="filter" data-filter="finance">
            <span class="filter-label">年度</span>
            <!-- 年份子 Tab 由 app.js 动态填充 -->
            <span class="year-tabs"></span>
          </div>
        </div>
        <div id="finance-body"></div>
      </div>
    </div>

    <!-- 资产趋势：历史快照聚合，按币种分市值/浮盈两图 -->
    <div class="panel" id="panel-trend" style="display:none;">
      <div class="toolbar">
        <div class="filter" data-filter="trend-range">
          <span class="filter-label">时间</span>
          <span class="chip active" data-days="30">30 天</span>
          <span class="chip" data-days="90">90 天</span>
          <span class="chip" data-days="360">360 天</span>
          <span class="chip" data-days="0">全部</span>
        </div>
      </div>
      <div id="trend-info"></div>
      <div class="trend-block">
        <h3 class="section-title">总市值趋势</h3>
        <div class="chart-host" id="trend-mv-chart"></div>
      </div>
      <div class="trend-block">
        <h3 class="section-title">浮动盈亏趋势</h3>
        <div class="chart-host" id="trend-pl-chart"></div>
      </div>
      <div class="trend-block">
        <h3 class="section-title">区间市值变化（每日环比）</h3>
        <div id="trend-table"></div>
      </div>
      <div class="disclaimer" id="trend-disclaimer"></div>
    </div>

    <!-- 美元汇率 -->
    <div class="panel" id="panel-fx" style="display:none;">
      <div id="fx-info"></div>
      <div class="chart-host" id="fx-chart"></div>
    </div>
  </div>

  <!-- 个股详情下钻 -->
  <div class="overlay" id="overlay">
    <div class="detail">
      <div class="detail-head">
        <h2 id="detail-title">—</h2>
        <button class="close-btn" id="detail-close">关闭 ✕</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='vendor/lightweight-charts.standalone.production.js') }}"></script>
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
