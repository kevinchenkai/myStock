# myStock 配置模板
# 复制为 config.yaml 并填入真实值；config.yaml 已加入 .gitignore，请勿提交。

# 富途 OpenD 本地网关
futu:
  host: 127.0.0.1
  port: 11111
  # 交易解锁密码（部分查询接口需要）。
  # 推荐使用环境变量 MYSTOCK_FUTU_TRADE_PWD 注入，避免明文写入文件。
  # 若此处与环境变量都为空，则不执行 unlock_trade。
  trade_pwd: ""
  # 交易环境：REAL（实盘）/ SIMULATE（模拟）。
  # 注意：历史成交 history_deal_list_query 仅支持 REAL。
  trd_env: REAL

# 数据抓取范围
collect:
  # 历史订单/成交/行情抓取起始日期
  start_date: "2025-01-01"
  # 市场范围（仅支持 HK / US）
  markets:
    - HK
    - US

# 数据库
db:
  path: "data/mystock.db"

# Web 服务
web:
  host: 127.0.0.1
  port: 8888
